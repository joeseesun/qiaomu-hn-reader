<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#faf9f7" />
    <meta name="color-scheme" content="light" />
    <meta name="application-name" content="乔木 HN 速读" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="乔木 HN 速读" />
    <meta name="robots" content="index,follow,max-image-preview:large" />
    <title>乔木 HN 速读</title>
    <meta
      name="description"
      content="为中文开发者和产品人做的 Hacker News 中文速读：首页精选、升温榜、产品雷达和评论摘要。"
    />
    <link rel="canonical" href="%PUBLIC_BASE_URL%/" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta property="og:site_name" content="乔木 HN 速读" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="乔木 HN 速读" />
    <meta property="og:description" content="每小时同步 Hacker News 热门内容，面向中文读者整理标题、摘要、升温榜、产品雷达和评论速读。" />
    <meta property="og:url" content="%PUBLIC_BASE_URL%/" />
    <meta property="og:image" content="%PUBLIC_BASE_URL%/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="乔木 HN 速读中文 Hacker News 阅读器" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="乔木 HN 速读" />
    <meta name="twitter:description" content="中文速读 Hacker News 最新和热门内容。" />
    <meta name="twitter:image" content="%PUBLIC_BASE_URL%/og-image.png" />
    <link rel="stylesheet" href="/styles.css?v=%APP_VERSION%" />
    %UMAMI_SCRIPT%
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "乔木 HN 速读",
        "alternateName": "Qiaomu HN Reader",
        "url": "%PUBLIC_BASE_URL%/",
        "applicationCategory": "NewsApplication",
        "operatingSystem": "Web",
        "inLanguage": "zh-CN",
        "isAccessibleForFree": true,
        "description": "为中文开发者和产品人做的 Hacker News 中文速读：首页精选、升温榜、产品雷达和评论摘要。",
        "image": "%PUBLIC_BASE_URL%/og-image.png",
        "publisher": {
          "@type": "Organization",
          "name": "向阳乔木",
          "url": "https://qiaomu.ai/"
        },
        "potentialAction": {
          "@type": "SearchAction",
          "target": "%PUBLIC_BASE_URL%/?q={search_term_string}",
          "query-input": "required name=search_term_string"
        }
      }
    </script>
    <script defer src="/lucide-icons.js?v=%APP_VERSION%"></script>
    %INITIAL_DATA%
    <script type="module" src="/app.js?v=%APP_VERSION%"></script>
  </head>
  <body>
    <a class="skip-link" href="#feed">跳到新闻列表</a>

    <div class="shell">
      <header class="topbar">
        <a class="brand" href="/" aria-label="乔木 HN 速读首页">
          <img class="brand-icon" src="/favicon.svg" width="22" height="22" alt="" aria-hidden="true" />
          <span class="brand-name">乔木 HN 速读</span>
          <span class="brand-sub">Hacker News 中文雷达</span>
        </a>
        <div class="topbar-actions">
          <button class="install-app-btn" type="button" data-action="install-app" hidden>
            <span data-lucide="download" aria-hidden="true"></span>
            <span>安装App</span>
          </button>
        </div>
      </header>

      <nav class="section-tabs" data-view-tabs role="tablist" aria-label="内容导航" aria-orientation="horizontal"></nav>

      <div class="toolbar">
        <label class="search">
          <span data-lucide="search" aria-hidden="true"></span>
          <input type="search" data-search-input placeholder="搜索 Hacker News…" autocomplete="off" spellcheck="false" />
        </label>
        <div class="filter-group">
          <button class="filter-icon" type="button" data-action="sort-points" data-sort-points="desc" aria-label="当前按热度从高到低,点击改为低到高">
            <span data-lucide="arrow-down-wide-narrow" aria-hidden="true"></span>
          </button>
          <button class="filter-icon" type="button" data-action="refresh" aria-label="刷新">
            <span data-lucide="refresh-cw" aria-hidden="true"></span>
          </button>
        </div>
      </div>

      <!-- feed 状态头 -->
      <div class="feed-head">
        <div class="feed-head-main">
          <h2 class="feed-title" data-feed-title>首页精选</h2>
          <span class="feed-count" data-feed-count></span>
        </div>
        <div class="feed-actions">
          <button class="feed-action-btn" type="button" data-action="export-favorites" hidden>
            <span data-lucide="download" aria-hidden="true"></span>
            <span>导出收藏</span>
          </button>
        </div>
      </div>

      <!-- 新闻流 -->
      <main id="feed" class="feed" data-story-list role="tabpanel" aria-busy="false"></main>
      <div class="sr-only" data-feed-status role="status" aria-live="polite" aria-atomic="true"></div>

      <!-- 页脚(低干扰署名) -->
      <footer class="footer">
        <span>Powered by <a href="https://qiaomu.ai/" target="_blank" rel="noopener noreferrer">向阳乔木</a></span>
        <a href="https://news.ycombinator.com/" target="_blank" rel="noopener noreferrer">Hacker News</a>
        <a href="https://hnrss.org/" target="_blank" rel="noopener noreferrer">HNRSS</a>
      </footer>
    </div>

    <div class="toast" data-toast role="status" aria-live="polite"></div>
  </body>
</html>
