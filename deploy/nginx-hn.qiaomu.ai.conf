server {
    listen 80;
    server_name hn.qiaomu.ai;

    access_log /www/wwwlogs/hn.qiaomu.ai.log;
    error_log /www/wwwlogs/hn.qiaomu.ai.error.log;

    location ^~ /.well-known/acme-challenge/ {
        root /www/wwwroot/hn.qiaomu.ai;
        default_type text/plain;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name hn.qiaomu.ai;

    ssl_certificate /etc/letsencrypt/live/hn.qiaomu.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hn.qiaomu.ai/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    add_header Strict-Transport-Security "max-age=31536000" always;

    access_log /www/wwwlogs/hn.qiaomu.ai.log;
    error_log /www/wwwlogs/hn.qiaomu.ai.error.log;

    location / {
        proxy_cache off;
        proxy_pass http://127.0.0.1:3138;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
